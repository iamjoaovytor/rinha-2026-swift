global
    maxconn 4096

defaults
    mode http
    timeout connect 1s
    timeout client  3s
    timeout server  3s
    option http-keep-alive

frontend rinha
    bind *:9999
    default_backend apis

backend apis
    balance roundrobin
    server api1 unix@/run/sock/api1.sock
    server api2 unix@/run/sock/api2.sock
