services:
  api1: &api
    image: rinha-2026-swift:local
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-local
    environment:
      SOCKET_PATH: /run/sock/api1.sock
    volumes:
      - sock:/run/sock
    cpus: "0.40"
    mem_limit: "160MB"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160MB"

  api2:
    <<: *api
    environment:
      SOCKET_PATH: /run/sock/api2.sock

  lb:
    image: haproxy:3.3-alpine
    user: "0:0"
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sock:/run/sock
    depends_on:
      - api1
      - api2
    cpus: "0.20"
    mem_limit: "30MB"
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "30MB"

volumes:
  sock:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,mode=0777"
