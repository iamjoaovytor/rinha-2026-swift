services:
  api1: &api
    image: joaovytor/rinha-2026-swift:v3
    platform: linux/amd64
    environment: &api_env
      IVF_NPROBE: "${IVF_NPROBE:-12}"
      IVF_INITIAL_NPROBE: "${IVF_INITIAL_NPROBE:-2}"
      IVF_ADAPTIVE_MIN_VOTES: "${IVF_ADAPTIVE_MIN_VOTES:-1}"
      IVF_ADAPTIVE_MAX_VOTES: "${IVF_ADAPTIVE_MAX_VOTES:-4}"
      IVF_ADAPTIVE_EXPAND_UNANIMOUS: "${IVF_ADAPTIVE_EXPAND_UNANIMOUS:-0}"
      IVF_ADAPTIVE_EXPANDED_USE_BBOX: "${IVF_ADAPTIVE_EXPANDED_USE_BBOX:-1}"
      IVFPQ_RERANK_CANDIDATES: "${IVFPQ_RERANK_CANDIDATES:-}"
      IVF_USE_BBOX: "${IVF_USE_BBOX:-0}"
      DEBUG_STATS: "${DEBUG_STATS:-0}"
      WARMUP_COUNT: "${WARMUP_COUNT:-50000}"
      SOCKET_HANDOFF: "1"
      SOCKET_PATH: "/sockets/api1.sock"
    volumes:
      - sockets:/sockets
    cpus: "0.35"
    mem_limit: "130MB"
    security_opt:
      - seccomp:unconfined
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "130MB"

  api2:
    <<: *api
    environment:
      <<: *api_env
      SOCKET_PATH: "/sockets/api2.sock"
    volumes:
      - sockets:/sockets

  lb:
    image: jrblatt/so-no-forevis:v1.0.0
    ports:
      - "9999:9999"
    environment:
      UPSTREAMS: /sockets/api1.sock,/sockets/api2.sock
      PORT: "9999"
      BUF_SIZE: "4096"
      WORKERS: "1"
    volumes:
      - sockets:/sockets
    cpus: "0.30"
    mem_limit: "90MB"
    security_opt:
      - seccomp:unconfined
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: "90MB"

volumes:
  sockets:
