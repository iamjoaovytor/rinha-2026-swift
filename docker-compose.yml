services:
  api1: &api
    image: rinha-2026-swift:local
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-local
    environment: &api_env
      IVF_NPROBE: "${IVF_NPROBE:-4}"
      IVF_INITIAL_NPROBE: "${IVF_INITIAL_NPROBE:-}"
      IVF_ADAPTIVE_MIN_VOTES: "${IVF_ADAPTIVE_MIN_VOTES:-2}"
      IVF_ADAPTIVE_MAX_VOTES: "${IVF_ADAPTIVE_MAX_VOTES:-3}"
      IVF_USE_BBOX: "${IVF_USE_BBOX:-0}"
      PORT: "3001"
    cpus: "0.40"
    mem_limit: "160MB"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160MB"

  api2:
    <<: *api
    environment:
      <<: *api_env
      PORT: "3002"

  lb:
    image: haproxy:3.3-alpine
    user: "0:0"
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - api1
      - api2
    cpus: "0.20"
    mem_limit: "30MB"
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "30MB"
