services:
  api1: &api
    image: joaovytor/iamjoaovytor-swift-c:latest
    platform: linux/amd64
    environment: &api_env
      IVF_NPROBE: "${IVF_NPROBE:-12}"
      IVF_INITIAL_NPROBE: "${IVF_INITIAL_NPROBE:-2}"
      IVF_ADAPTIVE_MIN_VOTES: "${IVF_ADAPTIVE_MIN_VOTES:-1}"
      IVF_ADAPTIVE_MAX_VOTES: "${IVF_ADAPTIVE_MAX_VOTES:-4}"
      IVF_ADAPTIVE_EXPAND_UNANIMOUS: "${IVF_ADAPTIVE_EXPAND_UNANIMOUS:-1}"
      IVF_ADAPTIVE_EXPANDED_USE_BBOX: "${IVF_ADAPTIVE_EXPANDED_USE_BBOX:-1}"
      IVFPQ_RERANK_CANDIDATES: "${IVFPQ_RERANK_CANDIDATES:-}"
      IVF_USE_BBOX: "${IVF_USE_BBOX:-0}"
      DEBUG_STATS: "${DEBUG_STATS:-0}"
      WARMUP_COUNT: "${WARMUP_COUNT:-50000}"
      SOCKET_HANDOFF: "1"
      SOCKET_PATH: "/sockets/api1.sock"
    volumes:
      - sockets:/sockets
    cpus: "0.35"
    mem_limit: "130MB"
    security_opt:
      - seccomp:unconfined
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "130MB"

  api2:
    <<: *api
    environment:
      <<: *api_env
      SOCKET_PATH: "/sockets/api2.sock"
    volumes:
      - sockets:/sockets

  lb:
    image: jrblatt/so-no-forevis:v1.0.0
    ports:
      - "9999:9999"
    environment:
      UPSTREAMS: /sockets/api1.sock,/sockets/api2.sock
      PORT: "9999"
      BUF_SIZE: "4096"
      WORKERS: "1"
    volumes:
      - sockets:/sockets
    cpus: "0.26"
    mem_limit: "78MB"
    security_opt:
      - seccomp:unconfined
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.26"
          memory: "78MB"

  warmup:
    image: curlimages/curl:8.8.0
    platform: linux/amd64
    entrypoint:
      - /bin/sh
      - -c
      - |
        until curl -fsS http://lb:9999/ready 2>/dev/null; do sleep 1; done
        PA='{"id":"wa","transaction":{"amount":85.50,"installments":1,"requested_at":"2026-05-16T10:00:00Z"},"customer":{"avg_amount":90.0,"tx_count_24h":2,"known_merchants":["merch-01"]},"merchant":{"id":"merch-01","mcc":"5411","avg_amount":95.0},"terminal":{"is_online":false,"card_present":true,"km_from_home":1.2},"last_transaction":{"timestamp":"2026-05-15T18:30:00Z","km_from_current":0.8}}'
        PB='{"id":"wb","transaction":{"amount":450.0,"installments":3,"requested_at":"2026-05-16T03:00:00Z"},"customer":{"avg_amount":60.0,"tx_count_24h":8,"known_merchants":[]},"merchant":{"id":"merch-99","mcc":"5912","avg_amount":200.0},"terminal":{"is_online":true,"card_present":false,"km_from_home":350.0},"last_transaction":null}'
        i=0
        while [ $$i -lt 50 ]; do
          curl -fsS -X POST http://lb:9999/fraud-score -H 'Content-Type: application/json' -d "$$PA" > /dev/null
          curl -fsS -X POST http://lb:9999/fraud-score -H 'Content-Type: application/json' -d "$$PB" > /dev/null
          i=$$(($$i+1))
        done
    depends_on:
      - lb
    cpus: "0.04"
    mem_limit: "12MB"
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "0.04"
          memory: "12MB"

volumes:
  sockets:
